agent:
  name: C.O.R.E
  ollama_model: llama3
  ollama_url: http://localhost:11434
  provider: gemini
  use_llm: true
response:
  block_threshold: 90
  dry_run: false
sources:
  email:
    enabled: true
    folder: INBOX
    password: password
    server: imap.example.com
    username: security@example.com
  logs:
    - test_log.txt
  webhook_port: 8081
  wifi_interface: "wlan0"

remote_response:
  enabled: true
  wazuh:
    enabled: true
    url: "https://wazuh.enterprise.local:55000"
    api_key: "PASTE_WAZUH_API_KEY_HERE"
    dry_run: true

deception:
  enabled: true
  scramble_interval: 3600 # Change lures every hour
  alert_on_touch: true


simulation:
  enabled: true
  file_interval: 5
  kafka_interval: 10
